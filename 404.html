<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Your Name</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f8f6;
      --border: #e4e2dc;
      --text: #1a1917;
      --muted: #6b6860;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --border: #2e2d2b;
        --text: #e8e6e1;
        --muted: #8a8880;
      }
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .nav-name {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-back {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      font-family: 'DM Mono', monospace;
    }

    .nav-back:hover { color: var(--text); }

    main {
      flex: 1;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 300;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
    }

    .sub {
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'DM Mono', monospace;
      text-decoration: none;
      background: var(--text);
      color: var(--bg);
      border: 1px solid var(--text);
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.8; }

    footer {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 2rem 48px;
      display: flex;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    footer p {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin: 0;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-name" href="/">your.name</a>
  <a class="nav-back" href="/">back home</a>
</nav>

<main>
  <p class="label">404 — not found</p>
  <h1>This page<br />doesn't exist.</h1>
  <p class="sub">You may have followed a broken link or mistyped the URL.</p>
  <a class="btn" href="/">go home</a>
</main>

<footer>
  <p>Built with plain HTML — hosted on GitHub Pages</p>
  <p>© 2026 Your Name</p>
</footer>

</body>
</html>
